<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSense</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" class="logo"> <!-- Circular logo -->
            <span class="logo-text">ShopSense</span>
        </div>
        <div class="nav-links">
            <a href="#">About us</a>
            <a href="#">Deals</a>
            <a href="#">Notifications</a>
            <a href="#">Contact Us</a>
        </div>
    </nav>

    <section class="search-section">
        <form action="/search" method="POST">
            <input type="text" name="product_name" placeholder="Search for products..." class="search-bar" required>
            <button type="submit" class="search-button"><img src="camera-icon.png" alt="Camera"></button>
        </form>
    </section>

    <section class="product-section">
        <div class="most-searched">
            <h2>Most Searched Products</h2>
            <div class="product-card">
                <img src="product1.jpg" alt="Product 1">
                <h3>Product Name 1</h3>
                <p class="price">$Price</p>
                <p class="ratings">⭐⭐⭐⭐☆</p>
                <p class="platform">Platform: Example</p>
            </div>
            <div class="product-card">
                <img src="product2.jpg" alt="Product 2">
                <h3>Product Name 2</h3>
                <p class="price">$Price</p>
                <p class="ratings">⭐⭐⭐⭐☆</p>
                <p class="platform">Platform: Example</p>
            </div>
        </div>
        <div class="most-purchased">
            <h2>Most Purchased Items</h2>
            <div class="product-card">
                <img src="product3.jpg" alt="Product 3">
                <h3>Product Name 3</h3>
                <p class="price">$Price</p>
                <p class="ratings">⭐⭐⭐⭐☆</p>
                <p class="platform">Platform: Example</p>
            </div>
            <div class="product-card">
                <img src="product4.jpg" alt="Product 4">
                <h3>Product Name 4</h3>
                <p class="price">$Price</p>
                <p class="ratings">⭐⭐⭐⭐☆</p>
                <p class="platform">Platform: Example</p>
            </div>
        </div>
    </section>
</body>
</html>
